# fly.toml app configuration file generated for loom-v3 on 2026-02-04T09:38:01-06:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'loom-v3'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  HOST = '0.0.0.0'
  NODE_ENV = 'production'
  PORT = '3000'

[[mounts]]
  source = 'loom_data'
  destination = '/data'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
